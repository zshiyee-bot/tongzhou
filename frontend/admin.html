<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 视频分析系统</title>
    <link rel="icon" type="image/png" href="/static/tongzhou.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
        }

        /* 登录页面 */
        .login-container {
            max-width: 400px;
            padding: 60px 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #f44336;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        /* 管理界面 */
        .admin-container {
            display: none;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 24px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
            padding: 0 40px;
        }

        .tab {
            padding: 16px 24px;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .content {
            padding: 40px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        /* 表单样式 */
        .form-section {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .form-section h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-danger {
            padding: 10px 24px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            margin-top: 16px;
            display: none;
        }

        .danger-zone {
            background: #fff3f3;
            border: 2px solid #ffcdd2;
            padding: 24px;
            border-radius: 8px;
            margin-top: 40px;
        }

        .danger-zone h3 {
            color: #f44336;
            margin-bottom: 16px;
        }

        .danger-zone p {
            color: #666;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="container login-container" id="loginContainer">
        <div class="login-header">
            <h1>🔐 管理后台</h1>
            <p>请输入管理员密码</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>管理员密码</label>
                <input type="password" id="adminPassword" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
            <div class="error-message" id="loginError"></div>
        </form>
    </div>

    <!-- 管理界面 -->
    <div class="container admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>📊 管理后台</h1>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('stats')">数据统计</div>
            <div class="tab" onclick="switchTab('api')">API配置</div>
            <div class="tab" onclick="switchTab('password')">密码管理</div>
            <div class="tab" onclick="switchTab('danger')">危险操作</div>
        </div>

        <div class="content">
            <!-- 数据统计 -->
            <div class="tab-content active" id="stats-content">
                <h2 style="margin-bottom: 24px;">数据统计</h2>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <h3>总视频记录</h3>
                        <div class="value" id="totalRecords">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>工作表数量</h3>
                        <div class="value" id="totalSheets">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>今日新增</h3>
                        <div class="value" id="todayRecords">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>AI分析完成率</h3>
                        <div class="value" id="analysisRate">-</div>
                    </div>
                </div>
            </div>

            <!-- API配置 -->
            <div class="tab-content" id="api-content">
                <h2 style="margin-bottom: 24px;">API配置管理</h2>
                <div class="form-section">
                    <h3>Gemini API 配置</h3>
                    <div class="input-group">
                        <label>当前激活的API</label>
                        <select id="activeApi">
                            <option value="gemini">Gemini</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>API密钥</label>
                        <input type="password" id="apiKey" placeholder="输入API密钥">
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Base URL</label>
                            <input type="text" id="baseUrl" placeholder="API地址">
                        </div>
                        <div class="input-group">
                            <label>模型名称</label>
                            <input type="text" id="modelName" placeholder="模型名称">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="updateAPIConfig()">保存配置</button>
                    <div class="success-message" id="apiSuccess">配置已更新，请重启后端服务生效</div>
                </div>
            </div>

            <!-- 密码管理 -->
            <div class="tab-content" id="password-content">
                <h2 style="margin-bottom: 24px;">密码管理</h2>
                <div class="form-section">
                    <h3>前端登录密码</h3>
                    <p style="color: #666; margin-bottom: 16px;">当前密码：<strong id="currentPassword">加载中...</strong></p>
                    <div class="input-group">
                        <label>新密码</label>
                        <input type="text" id="newPassword" placeholder="输入新的前端登录密码">
                    </div>
                    <button class="btn-primary" onclick="updateFrontendPassword()">更新密码</button>
                    <div class="success-message" id="passwordSuccess">密码已更新</div>
                </div>
            </div>

            <!-- 危险操作 -->
            <div class="tab-content" id="danger-content">
                <h2 style="margin-bottom: 24px;">危险操作</h2>
                <div class="danger-zone">
                    <h3>⚠️ 清空所有数据</h3>
                    <p>此操作将删除所有视频记录，但保留默认工作表。此操作不可恢复！</p>
                    <button class="btn-danger" onclick="clearAllData()">清空所有数据</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 自动检测API地址
        const API_BASE = window.location.protocol === 'file:'
            ? 'http://localhost:1018'
            : window.location.origin;

        let adminPassword = '';

        // 登录
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    adminPassword = password;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadStats();
                    loadAPIConfig();
                    loadFrontendPassword();
                } else {
                    document.getElementById('loginError').textContent = '密码错误';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = '登录失败: ' + error.message;
            }
        });

        // 退出登录
        function logout() {
            adminPassword = '';
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tabName}-content`).classList.add('active');
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/stats?password=${adminPassword}`);
                const data = await response.json();

                document.getElementById('totalRecords').textContent = data.total_records;
                document.getElementById('totalSheets').textContent = data.total_sheets;
                document.getElementById('todayRecords').textContent = data.today_records;
                document.getElementById('analysisRate').textContent = data.analysis_rate;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载API配置
        async function loadAPIConfig() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/config?password=${adminPassword}`);
                const data = await response.json();

                document.getElementById('activeApi').value = data.active;
                document.getElementById('apiKey').value = data.api_key;
                document.getElementById('baseUrl').value = data.base_url || '';
                document.getElementById('modelName').value = data.model || '';
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }

        // 更新API配置
        async function updateAPIConfig() {
            const active = document.getElementById('activeApi').value;
            const api_key = document.getElementById('apiKey').value;
            const base_url = document.getElementById('baseUrl').value;
            const model = document.getElementById('modelName').value;

            try {
                const response = await fetch(`${API_BASE}/api/admin/config?password=${adminPassword}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ active, api_key, base_url, model })
                });

                if (response.ok) {
                    const success = document.getElementById('apiSuccess');
                    success.style.display = 'block';
                    setTimeout(() => success.style.display = 'none', 3000);
                }
            } catch (error) {
                alert('更新失败: ' + error.message);
            }
        }

        // 加载前端密码
        async function loadFrontendPassword() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/frontend-password?password=${adminPassword}`);
                const data = await response.json();
                document.getElementById('currentPassword').textContent = data.password;
            } catch (error) {
                console.error('加载密码失败:', error);
            }
        }

        // 更新前端密码
        async function updateFrontendPassword() {
            const new_password = document.getElementById('newPassword').value;

            if (!new_password) {
                alert('请输入新密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/admin/frontend-password?password=${adminPassword}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password })
                });

                if (response.ok) {
                    const success = document.getElementById('passwordSuccess');
                    success.style.display = 'block';
                    setTimeout(() => success.style.display = 'none', 3000);
                    loadFrontendPassword();
                    document.getElementById('newPassword').value = '';
                }
            } catch (error) {
                alert('更新失败: ' + error.message);
            }
        }

        // 清空所有数据
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                return;
            }

            if (!confirm('再次确认：真的要删除所有视频记录吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/admin/clear-data?password=${adminPassword}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('所有数据已清空');
                    loadStats();
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
