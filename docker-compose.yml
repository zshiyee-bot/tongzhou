version: '3.8'

services:
  tongzhou-video:
    build: ./backend
    container_name: tongzhou-video
    ports:
      - "1018:1018"
    volumes:
      # 持久化数据
      - ./backend/video_analysis.db:/app/video_analysis.db
      - ./backend/downloads:/app/downloads
      - ./backend/compressed:/app/compressed
      - ./backend/preset_images:/app/preset_images
      - ./backend/api_config.yaml:/app/api_config.yaml
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1018/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
